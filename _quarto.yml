project:
  type: book
  output-dir: docs

lang: de
language:
  de:
    title-block-author-single: "Autor"
    title-block-author-plural: "Autoren"

book:
  title: "Einführung in R"
  subtitle: "Lehrstuhl für VWL, insb. Wirtschaftspolitik, Fernuniversität in Hagen"
  author:
    - name: Andreas Fischeneder
      email: andreas.fischeneder@fernuni-hagen.de
  
  chapters:
    - index.qmd
    
    - part: "Grundlagen"
      chapters:
        - erste_schritte.qmd
        - best_practices.qmd
    
    - part: "Datenaufbereitung"
      chapters:
        - daten_transform.qmd
        - daten_import.qmd
        - daten_export.qmd
    
    - part: "Datenvisualisierung"
      chapters:
        - visualisierung.qmd
    
    - part: "Statistik in R"
      chapters:
        - deskript_statistik.qmd
        - regressionen.qmd
    
    - part: "Ergebnisexportierung und Berichte"
      chapters:
        - tab_fig_export.qmd
        - reports.qmd
    
    - part: "Weitere Themen"
      chapters:
        - loops_funktionen.qmd
        - ki.qmd
  
    - referenzen.qmd

  sidebar:
    style: "docked"
    search: true

bibliography: rintro_references.bib

format:
  html:
    theme: 
      - cosmo
      - style.scss
    code-link: true
    author-meta: "Andreas Fischeneder"
    callout-appearance: simple

execute:
  freeze: auto
  warning: false
  message: false
  